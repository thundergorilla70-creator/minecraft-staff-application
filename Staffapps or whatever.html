<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Staff Application</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg,#2c3e50,#4ca1af);
            margin: 0;
            padding: 0;
            color: white;
        }

        .container {
            max-width: 700px;
            margin: 50px auto;
            background: rgba(0,0,0,0.7);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: none;
            border-radius: 5px;
        }

        textarea {
            height: 100px;
            resize: vertical;
        }

        button {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            background: #27ae60;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

            button:hover {
                background: #2ecc71;
            }

        .success {
            display: none;
            text-align: center;
            margin-top: 20px;
            color: #2ecc71;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>Minecraft Staff Application</h1>

        <form id="appForm">

            <label>Minecraft Username</label>
            <input type="text" required>

            <label>Age</label>
            <input type="number" required>

            <label>Discord Username</label>
            <input type="text" required>

            <label>Position Applying For</label>
            <select required>
                <option>Helper</option>
                <option>Moderator</option>
                <option>Admin</option>
                <option>Builder</option>
            </select>

            <label>How long have you played on the server?</label>
<textarea required></textarea>

            <label>Why should we choose you as staff?</label>
<textarea required></textarea>

            <label>Have you been staff before? If yes, where?</label>
<textarea></textarea>

            <label>How many hours can you be online daily?</label>
            <input type="text">

            <button type="submit">Submit Application</button>

        </form>

        <div class="success" id="successMsg">
            Application submitted successfully!
        </div>

    </div>

    <script>

        const webhookURL = "https://discord.com/api/webhooks/1480084935082774681/PBA83HJdIbpqZrU-auqDtvfbf7yXFQH6VeetRVcjpX96knlx0J0VCUrTZwpnbVfgcmMj";

        document.getElementById("appForm").addEventListener("submit", async function (e) {
            e.preventDefault();

            const username = document.getElementById("username").value;
            const age = document.getElementById("age").value;
            const discord = document.getElementById("discord").value;

            const data = {
                content: "📨 New Staff Application",
                embeds: [{
                    title: "Application",
                    color: 5763719,
                    fields: [
                        { name: "Minecraft Username", value: username },
                        { name: "Age", value: age },
                        { name: "Discord", value: discord }
                    ]
                }]
            };

            await fetch(webhookURL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });

            alert("Application submitted!");

        });

    </script>

</body>
</html>
